# Default values for galoy-deps.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

kubemonkey:
  enabled: true
  fullnameOverride: kubemonkey
  resources: {}

opentelemetry-collector:
  image:
    repository: "otel/opentelemetry-collector-k8s"
  service:
    enabled: true
  extraEnvs:
  - name: K8S_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  enabled: true
  clusterRole:
    create: true
    rules:
    - apiGroups: [""]
      resources: ["nodes/stats"]
      verbs: ["get"]
  resources: {}
  mode: daemonset
  config:
    exporters:
      debug: {}
      otlp:
        endpoint: "api.honeycomb.io:443"
        headers:
          "x-honeycomb-team": ${HONEYCOMB_API_KEY}
          "x-honeycomb-dataset": ${HONEYCOMB_DATASET}
    extensions:
      health_check: {}
    processors:
      batch: {}
      tail_sampling:
        policies:
        - name: status_code
          type: status_code
          status_code:
            status_codes: [ERROR]
        - name: probabilistic
          type: probabilistic
          probabilistic: { sampling_percentage: 100 }
      attributes:
        actions:
        - key: graphql.variables.input.code
          action: update
          value: "<redacted>"
        - key: code.function.params.code
          action: update
          value: "<redacted>"
        - key: code.function.params.token
          action: update
          value: "<redacted>"
        - key: code.function.params.cookie
          action: update
          value: "<redacted>"
        - key: code.function.params.authToken
          action: update
          value: "<redacted>"
        - key: code.function.params.totpCode
          action: update
          value: "<redacted>"
        - key: code.function.params.body
          action: update
          value: "<redacted>"
        - key: code.function.params.macaroon
          action: update
          value: "<redacted>"
        - key: code.function.params.cert
          action: update
          value: "<redacted>"
        - key: code.function.params.secret
          action: update
          value: "<redacted>"
        - key: code.function.params.rawHeaders
          action: update
          value: "<redacted>"
        - key: code.function.params.key
          action: update
          value: "<redacted>"
        - key: code.function.params.value
          action: update
          value: "<redacted>"
        - key: args
          action: update
          value: "<redacted>"
        - key: graphql.variables.input.jwt
          action: update
          value: "<redacted>"
        - key: code.function.params.jwt
          action: update
          value: "<redacted>"
        - key: code.function.params.password
          action: update
          value: "<redacted>"
        - key: graphql.variables.input.totpCode
          action: update
          value: "<redacted>"
        - key: graphql.variables.input.authToken
          action: update
          value: "<redacted>"
      # Default memory limiter configuration for the collector based on k8s resource limits.
      memory_limiter:
        # check_interval is the time between measurements of memory usage.
        check_interval: 5s
        # By default limit_mib is set to 80% of ".Values.resources.limits.memory"
        limit_percentage: 80
        # By default spike_limit_mib is set to 25% of ".Values.resources.limits.memory"
        spike_limit_percentage: 25
      resourcedetection:
        detectors: [env, gcp]
        timeout: 5s
        override: false
      k8sattributes:
        passthrough: true
      filter/ottl:
        error_mode: ignore
        metrics:
          metric:
            - 'resource.attributes["k8s.namespace.name"] == "kube-system"'
    receivers:
      kubeletstats:
        collection_interval: 60s
        auth_type: "serviceAccount"
        endpoint: "https://${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true
      jaeger:
        protocols:
          grpc:
            endpoint: 0.0.0.0:14250
          thrift_http:
            endpoint: 0.0.0.0:14268
          thrift_compact:
            endpoint: 0.0.0.0:6831
          thrift_binary:
            endpoint: 0.0.0.0:6832
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    service:
      extensions:
        - health_check
      pipelines:
        logs:
          exporters:
            - debug
          processors:
            - memory_limiter
            - batch
          receivers:
            - otlp
        metrics:
          exporters:
            - otlp
            - debug
          processors:
            - filter/ottl
            - memory_limiter
            - batch
          receivers:
            - otlp
            - kubeletstats
        traces:
          exporters:
            - debug
            - otlp
          processors:
            - filter/ottl
            - memory_limiter
            - resourcedetection
            - attributes
            - k8sattributes
            - tail_sampling
            - batch
          receivers:
            - jaeger
            - otlp
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      hostPort: 4317
      protocol: TCP
    jaeger-thrift-b:
      enabled: true
      containerPort: 6832
      servicePort: 6832
      hostPort: 6832
      protocol: UDP
    jaeger-thrift:
      enabled: true
      containerPort: 14268
      servicePort: 14268
      hostPort: 14268
      protocol: TCP

cert-manager:
  enabled: true
  crds:
   enabled: true
  resources: {}

ingress-nginx:
  enabled: true
  controller:
    allowSnippetAnnotations: true
    resources: {}
    ingressClassResource:
      default: true
      watchIngressWithoutClass: true
    config:
      enable-opentelemetry: true
      annotations-risk-level: "Critical"
      log-format-upstream: "$remote_addr - $remote_user [$time_local] \"$request\" $status $body_bytes_sent \"$http_referer\" \"$http_user_agent\" $request_length $request_time [$proxy_upstream_name] [$proxy_alternative_upstream_name] $upstream_addr $upstream_response_length $upstream_response_time $upstream_status $req_id"
    service:
      externalTrafficPolicy: Local
      # service type should be NodePort when deploying locally
      type: LoadBalancer
    metrics:
      enabled: true
      service:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "10254"

galoyAgentsProxy:
  # Master toggle. When false, nothing below is deployed and the kubernetes-mcp-server
  # dependency is skipped via its `condition: galoyAgentsProxy.enabled`.
  enabled: false

  # Identifier for this deployment (e.g. "galoy-staging"). Used in labels/logs/JWT audience.
  deploymentId: ""

  # Public hostname exposed via the existing ingress-nginx (e.g. mcp.galoy-staging.galoy.io).
  publicHostname: ""

  # galoy-agents JWKS endpoint. Envoy fetches and caches public keys from here.
  jwksUrl: "https://mcp.agents.galoy.io/.well-known/jwks.json"
  jwksHost: "mcp.agents.galoy.io"
  jwksPort: 443
  jwtIssuer: "galoy-agents"

  # Optional: restrict inbound traffic to this source IP (galoy-agents cluster egress NAT).
  galoyAgentsEgressIP: ""

  kubernetesMcp:
    # Namespaces where the kubernetes-mcp-server SA gets a read-only RoleBinding.
    # Kept separate from the upstream chart values so we can template RoleBindings per namespace.
    allowedNamespaces: []

  postgresMcp:
    image:
      repository: crystaldba/postgres-mcp
      tag: latest
      pullPolicy: IfNotPresent
    # Name of an existing Secret in this namespace containing a DATABASE_URI key
    # pointing at the read-only DB role.
    existingSecret: ""
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  envoy:
    image:
      repository: envoyproxy/envoy
      tag: v1.32-latest
      pullPolicy: IfNotPresent
    replicas: 2
    rateLimitRps: 20
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  ingress:
    className: "nginx"
    certManagerClusterIssuer: "letsencrypt"
    annotations: {}

# Values for the upstream kubernetes-mcp-server chart (only applied when galoyAgentsProxy.enabled=true).
kubernetes-mcp-server:
  fullnameOverride: "galoy-agents-proxy-k8s-mcp"
  extraArgs:
    - "--read-only"
  ingress:
    enabled: false
  rbac:
    # We create our own namespace-scoped RoleBindings in templates/galoy-agents-proxy/.
    create: false
  serviceAccount:
    create: true
    name: "galoy-agents-proxy-k8s-mcp"
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
