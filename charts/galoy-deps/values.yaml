# Default values for galoy-deps.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

kubemonkey:
  enabled: true
  fullnameOverride: kubemonkey
  resources: {}

opentelemetry-collector:
  image:
    repository: "otel/opentelemetry-collector-k8s"
  service:
    enabled: true
  extraEnvs:
  - name: K8S_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  enabled: true
  clusterRole:
    create: true
    rules:
    - apiGroups: [""]
      resources: ["nodes/stats"]
      verbs: ["get"]
  resources: {}
  mode: daemonset
  config:
    exporters:
      debug: {}
      otlp:
        endpoint: "api.honeycomb.io:443"
        headers:
          "x-honeycomb-team": ${HONEYCOMB_API_KEY}
          "x-honeycomb-dataset": ${HONEYCOMB_DATASET}
    extensions:
      health_check: {}
    processors:
      batch: {}
      tail_sampling:
        policies:
        - name: status_code
          type: status_code
          status_code:
            status_codes: [ERROR]
        - name: probabilistic
          type: probabilistic
          probabilistic: { sampling_percentage: 100 }
      attributes:
        actions:
        - key: graphql.variables.input.code
          action: update
          value: "<redacted>"
        - key: code.function.params.code
          action: update
          value: "<redacted>"
        - key: code.function.params.token
          action: update
          value: "<redacted>"
        - key: code.function.params.cookie
          action: update
          value: "<redacted>"
        - key: code.function.params.authToken
          action: update
          value: "<redacted>"
        - key: code.function.params.totpCode
          action: update
          value: "<redacted>"
        - key: code.function.params.body
          action: update
          value: "<redacted>"
        - key: code.function.params.macaroon
          action: update
          value: "<redacted>"
        - key: code.function.params.cert
          action: update
          value: "<redacted>"
        - key: code.function.params.secret
          action: update
          value: "<redacted>"
        - key: code.function.params.rawHeaders
          action: update
          value: "<redacted>"
        - key: code.function.params.key
          action: update
          value: "<redacted>"
        - key: code.function.params.value
          action: update
          value: "<redacted>"
        - key: args
          action: update
          value: "<redacted>"
        - key: graphql.variables.input.jwt
          action: update
          value: "<redacted>"
        - key: code.function.params.jwt
          action: update
          value: "<redacted>"
        - key: code.function.params.password
          action: update
          value: "<redacted>"
        - key: graphql.variables.input.totpCode
          action: update
          value: "<redacted>"
        - key: graphql.variables.input.authToken
          action: update
          value: "<redacted>"
      # Default memory limiter configuration for the collector based on k8s resource limits.
      memory_limiter:
        # check_interval is the time between measurements of memory usage.
        check_interval: 5s
        # By default limit_mib is set to 80% of ".Values.resources.limits.memory"
        limit_percentage: 80
        # By default spike_limit_mib is set to 25% of ".Values.resources.limits.memory"
        spike_limit_percentage: 25
      resourcedetection:
        detectors: [env, gcp]
        timeout: 5s
        override: false
      k8sattributes:
        passthrough: true
      filter/ottl:
        error_mode: ignore
        metrics:
          metric:
            - 'resource.attributes["k8s.namespace.name"] == "kube-system"'
    receivers:
      kubeletstats:
        collection_interval: 60s
        auth_type: "serviceAccount"
        endpoint: "https://${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true
      jaeger:
        protocols:
          grpc:
            endpoint: 0.0.0.0:14250
          thrift_http:
            endpoint: 0.0.0.0:14268
          thrift_compact:
            endpoint: 0.0.0.0:6831
          thrift_binary:
            endpoint: 0.0.0.0:6832
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    service:
      extensions:
        - health_check
      pipelines:
        logs:
          exporters:
            - debug
          processors:
            - memory_limiter
            - batch
          receivers:
            - otlp
        metrics:
          exporters:
            - otlp
            - debug
          processors:
            - filter/ottl
            - memory_limiter
            - batch
          receivers:
            - otlp
            - kubeletstats
        traces:
          exporters:
            - debug
            - otlp
          processors:
            - filter/ottl
            - memory_limiter
            - resourcedetection
            - attributes
            - k8sattributes
            - tail_sampling
            - batch
          receivers:
            - jaeger
            - otlp
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      hostPort: 4317
      protocol: TCP
    jaeger-thrift-b:
      enabled: true
      containerPort: 6832
      servicePort: 6832
      hostPort: 6832
      protocol: UDP
    jaeger-thrift:
      enabled: true
      containerPort: 14268
      servicePort: 14268
      hostPort: 14268
      protocol: TCP

cert-manager:
  enabled: true
  crds:
   enabled: true
  resources: {}

ingress-nginx:
  enabled: true
  controller:
    allowSnippetAnnotations: true
    resources: {}
    ingressClassResource:
      default: true
      watchIngressWithoutClass: true
    config:
      enable-opentelemetry: true
      annotations-risk-level: "Critical"
      log-format-upstream: "$remote_addr - $remote_user [$time_local] \"$request\" $status $body_bytes_sent \"$http_referer\" \"$http_user_agent\" $request_length $request_time [$proxy_upstream_name] [$proxy_alternative_upstream_name] $upstream_addr $upstream_response_length $upstream_response_time $upstream_status $req_id"
    service:
      externalTrafficPolicy: Local
      # service type should be NodePort when deploying locally
      type: LoadBalancer
    metrics:
      enabled: true
      service:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "10254"

# Read-only Kubernetes MCP server. Single toggle — RBAC, role rules,
# and bindings are all configured through the upstream subchart's
# `rbac.extra*` arrays below.
kubernetesMcp:
  enabled: false

# Values passed through to the upstream kubernetes-mcp-server chart.
# Only applied when kubernetesMcp.enabled=true (via the condition on
# the dependency in Chart.yaml).
kubernetes-mcp-server:
  fullnameOverride: "kubernetes-mcp-server"
  extraArgs:
    - "--read-only"
  ingress:
    enabled: false
  # Drive RBAC entirely from the upstream chart's `extra*` arrays rather
  # than hand-rolling ClusterRole/Binding templates. One ClusterRole
  # carrying every read verb the MCP's tools need, and one
  # ClusterRoleBinding to the MCP's ServiceAccount — cluster-wide read,
  # nothing else. Downstream deployments can narrow this via a values
  # overlay (e.g. swap the ClusterRoleBinding for per-namespace
  # RoleBindings) without modifying the chart.
  rbac:
    create: true
    extraClusterRoles:
      - name: read
        rules:
          - apiGroups: [""]
            resources:
              - pods
              - services
              - configmaps
              - events
              - endpoints
              - persistentvolumeclaims
              - namespaces
              - nodes
            verbs: ["get", "list", "watch"]
          - apiGroups: [""]
            resources:
              - pods/log
            verbs: ["get", "list"]
          - apiGroups: ["apps"]
            resources:
              - deployments
              - statefulsets
              - replicasets
              - daemonsets
            verbs: ["get", "list", "watch"]
          - apiGroups: ["batch"]
            resources:
              - jobs
              - cronjobs
            verbs: ["get", "list", "watch"]
          - apiGroups: ["networking.k8s.io"]
            resources:
              - ingresses
            verbs: ["get", "list", "watch"]
          # Newer events API (Kubernetes 1.19+). The core `""`.events
          # entry above covers the legacy shape; some components emit
          # only to this group.
          - apiGroups: ["events.k8s.io"]
            resources:
              - events
            verbs: ["get", "list", "watch"]
          # Metrics API — needed for `pods_top` / `nodes_top`.
          # `metrics.k8s.io` is served by metrics-server, exposes
          # aggregated CPU/memory only.
          - apiGroups: ["metrics.k8s.io"]
            resources:
              - pods
              - nodes
            verbs: ["get", "list"]
    extraClusterRoleBindings:
      - name: read
        roleRef:
          kind: ClusterRole
          name: read
        # `subjects` defaults to the MCP's ServiceAccount via the
        # subchart's template — no override needed.
  serviceAccount:
    create: true
    name: "kubernetes-mcp-server"
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Tunnel connector. Outbound WebSocket to drua that relays MCP tool
# calls against in-cluster MCP servers (kubernetes-mcp, postgres-mcp,
# lana admin MCP, ...). No inbound network exposure in this cluster —
# only the outbound WSS connection is used.
#
# Typical rollout: enable alongside `kubernetesMcp.enabled=true`, add
# the kubernetes upstream to `upstreams`, add further upstreams as
# their MCP services come online (postgres-mcp, lana admin MCP, etc).
tunnelConnector:
  enabled: false
  image:
    repository: us.gcr.io/galoyorg/tunnel-connector
    # Fallback tag, used only when `digest` is empty. The auto-bump job
    # in ci/pipeline.yml watches `:edge` and pins `digest` below on each
    # drua push, so `tag` is effectively only consulted on first-deploy
    # before the bot has ever run.
    tag: edge
    # Pinned image digest (e.g. `sha256:abc…`). When non-empty the
    # Deployment uses `<repo>@<digest>` instead of `<repo>:<tag>`, which
    # means a CI push can't silently roll a running release. Kept empty
    # in-repo and set by the `bump-tunnel-connector-image` bot PR.
    digest: ""
    pullPolicy: IfNotPresent
  # Drua tunnel WebSocket URL, e.g. `wss://mcp.agents.galoy.io/tunnel/ws`
  # in staging. Must accept a WS upgrade at `/tunnel/ws`.
  serverUrl: ""
  # Stable identifier — appears in drua's tool catalog as a prefix on
  # every tool name (e.g. `galoy_staging_k8s_list_pods`). Also
  # the key drua's TunnelRegistry uses to enforce single-live-tunnel
  # per deployment, so keep it distinct per release.
  deploymentId: ""
  # Name of an existing Secret in this namespace carrying a PKCS#8 PEM
  # Ed25519 private key under the `private_key.pem` key. Mounted read-only
  # at /var/run/secrets/tunnel-connector/private_key.pem; the connector
  # signs the handshake with it. The matching public key lives in drua's
  # `server.tunnel.deployments.<deploymentId>` config — drua rejects the
  # upgrade if the signature doesn't verify.
  existingPrivateKeySecret: ""
  # Upstream MCP servers the connector will relay to. Each entry becomes
  # part of TUNNEL_UPSTREAMS in `name=url,name=url` form. The connector
  # fetches the tool catalog from each at startup; if any upstream is
  # unreachable the whole registration retries with exponential backoff.
  #
  # Default: just the in-cluster kubernetes-mcp-server (enabled via
  # `kubernetesMcp.enabled=true`). Deployment-level values (e.g. in
  # galoy-deployments) add postgres / lana MCPs on top by overriding
  # this list in full — helm `upstreams:` is an atomic replacement, not
  # a merge.
  upstreams:
    - name: k8s
      url: http://kubernetes-mcp-server:8080/mcp
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
