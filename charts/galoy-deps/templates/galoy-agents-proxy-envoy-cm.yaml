{{- if .Values.galoyAgentsProxy.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: galoy-agents-proxy-envoy
  labels:
    {{- include "galoy-deps.labels" . | nindent 4 }}
    galoy-agents-proxy/component: envoy
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901

    static_resources:
      listeners:
        - name: mcp_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8080
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: mcp_http
                    codec_type: AUTO
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                          log_format:
                            json_format:
                              ts: "%START_TIME%"
                              method: "%REQ(:METHOD)%"
                              path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                              status: "%RESPONSE_CODE%"
                              duration_ms: "%DURATION%"
                              upstream: "%UPSTREAM_CLUSTER%"
                              jwt_sub: "%DYNAMIC_METADATA(envoy.filters.http.jwt_authn:jwt_payload:sub)%"
                              deployment: {{ .Values.galoyAgentsProxy.deploymentId | quote }}
                    http_filters:
                      - name: envoy.filters.http.jwt_authn
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                          providers:
                            galoy_agents:
                              issuer: {{ .Values.galoyAgentsProxy.jwtIssuer | quote }}
                              audiences:
                                - {{ .Values.galoyAgentsProxy.publicHostname | quote }}
                              remote_jwks:
                                http_uri:
                                  uri: {{ .Values.galoyAgentsProxy.jwksUrl | quote }}
                                  cluster: galoy_agents_jwks
                                  timeout: 5s
                                cache_duration:
                                  seconds: 300
                              forward: false
                              payload_in_metadata: jwt_payload
                          rules:
                            - match:
                                prefix: /
                              requires:
                                provider_name: galoy_agents
                      - name: envoy.filters.http.local_ratelimit
                        typed_config:
                          "@type": type.googleapis.com/udpa.type.v1.TypedStruct
                          type_url: type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                          value:
                            stat_prefix: mcp_rate_limit
                            token_bucket:
                              max_tokens: {{ mul (int .Values.galoyAgentsProxy.envoy.rateLimitRps) 10 }}
                              tokens_per_fill: {{ .Values.galoyAgentsProxy.envoy.rateLimitRps }}
                              fill_interval: 1s
                            filter_enabled:
                              runtime_key: local_rate_limit_enabled
                              default_value:
                                numerator: 100
                                denominator: HUNDRED
                            filter_enforced:
                              runtime_key: local_rate_limit_enforced
                              default_value:
                                numerator: 100
                                denominator: HUNDRED
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                    route_config:
                      name: mcp_routes
                      virtual_hosts:
                        - name: mcp_vhost
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: /k8s/
                              route:
                                cluster: k8s_mcp
                                prefix_rewrite: /
                                timeout: 60s
                            - match:
                                prefix: /db/
                              route:
                                cluster: pg_mcp
                                prefix_rewrite: /
                                timeout: 60s

      clusters:
        - name: galoy_agents_jwks
          type: LOGICAL_DNS
          dns_lookup_family: V4_ONLY
          connect_timeout: 5s
          load_assignment:
            cluster_name: galoy_agents_jwks
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.galoyAgentsProxy.jwksHost | quote }}
                          port_value: {{ .Values.galoyAgentsProxy.jwksPort }}
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              sni: {{ .Values.galoyAgentsProxy.jwksHost | quote }}
        - name: k8s_mcp
          type: STRICT_DNS
          connect_timeout: 5s
          load_assignment:
            cluster_name: k8s_mcp
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: galoy-agents-proxy-k8s-mcp
                          port_value: 8080
        - name: pg_mcp
          type: STRICT_DNS
          connect_timeout: 5s
          load_assignment:
            cluster_name: pg_mcp
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: galoy-agents-proxy-pg-mcp
                          port_value: 8000
{{- end }}
